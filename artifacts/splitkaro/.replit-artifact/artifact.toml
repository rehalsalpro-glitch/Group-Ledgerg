kind = "web"
previewPath = "/"
title = "SplitKaro – Hisab App"
version = "1.0.0"
id = "artifacts/splitkaro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25359

[services.development]
run = "pnpm --filter @workspace/splitkaro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/splitkaro", "run", "build" ]
publicDir = "artifacts/splitkaro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25359"
BASE_PATH = "/"
